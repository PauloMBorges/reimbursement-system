services:
  postgres:
    image: postgres:16-alpine # alpine: mais leve
    container_name: reimbursement-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # credenciais simples para o desafio
      POSTGRES_DB: reimbursement_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # garante que o Postgres tá pronto antes de aceitarmos conexões
      test: [ "CMD-SHELL", "pg_isready -U postgres -d reimbursement_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  # persistência dos dados
  postgres-data:

